<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake API Users</title>

  
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:40px;
}

h2{
text-align:center;
}

table{
border-collapse: collapse;
width:100%;
}

th, td{
border:1px solid black;
padding:10px;
text-align:center;
}

th{
background-color:#f2f2f2;
}

</style>

</head>

<body>

<h2>User Information Table</h2>

<table id="userTable">

<thead>
<tr>
<th>ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Username</th>
<th>Email</th>
<th>Zipcode</th>
<th>Latitude</th>
<th>Longitude</th>
</tr>
</thead>

<tbody>

<!-- Personal Information (First Row) -->
<tr>
<td>0</td>
<td>Vincent</td>
<td>Ampong</td>
<td>vincent123</td>
<td>vincentampong.nmsc.edu.ph</td>
<td>7014</td>
<td>7.853530</td>
<td>123.189113</td>
</tr>

</tbody>

</table>

<script>

$(document).ready(function(){

$.get("https://jsonplaceholder.typicode.com/users", function(data){

data.forEach(function(user){

let name = user.name.split(" ");
let firstname = name[0];
let lastname = name[1];

let row = `
<tr>
<td>${user.id}</td>
<td>${firstname}</td>
<td>${lastname}</td>
<td>${user.username}</td>
<td>${user.email}</td>
<td>${user.address.zipcode}</td>
<td>${user.address.geo.lat}</td>
<td>${user.address.geo.lng}</td>
</tr>
`;

$("#userTable tbody").append(row);

});

});

});

</script>

</body>
</html>
